platforms:
  reddit:
    # Subreddit + keyword targeting drives both reddit fetch paths:
    # - PRAW (default, API-based)
    # - Pushshift (when REDDIT_FETCH_BACKEND=pushshift)
    #
    # Environment overrides remain supported:
    # - REDDIT_SUBREDDITS overrides communities/subreddits from YAML
    # - REDDIT_KEYWORDS overrides keywords from YAML
    enabled: true
    communities: ["GalaxyWatch", "samsung", "wearables", "Android", "Smartwatch"]
    keywords: ["Samsung Health", "Galaxy Watch", "Galaxy Ring", "sleep", "workout"]
    days_back: 30
  google_play:
    enabled: true
    apps: ["com.sec.android.app.shealth"]
    countries: ["us", "gb", "in"]
    languages: ["en"]
    max_reviews_per_app: 1000
    keywords: []
  web_reviews:
    enabled: false
    sites:
      [
        "trustpilot.com",
        "g2.com",
        "cnet.com",
        "pcmag.com",
        "theverge.com",
        "androidauthority.com",
        "tomsguide.com",
        "techradar.com",
        "amazon.com",
        "bestbuy.com",
      ]
    max_pages_per_site: 50
    min_content_chars: 500
    crawl_paths: ["homepage", "category"]
    prioritize_keywords: false
